# LinkUp — production stack for a single VM (e.g. a Google Cloud Compute Engine
# instance). Run with:
#   docker compose --env-file .env.production -f docker-compose.prod.yml up -d --build
# Postgres + Redis run as containers with persistent volumes; the API connects to
# them over the compose network. To front the API with HTTPS on a domain, also
# start the `caddy` service:  ... up -d --profile tls
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-linkup}
      POSTGRES_USER: ${POSTGRES_USER:-linkup}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-linkup}']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file: .env.production
    environment:
      # Internal service URLs (override anything in env_file). The API reaches the
      # DB/Redis by their compose service names on the private network.
      DATABASE_URL: postgresql://${POSTGRES_USER:-linkup}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-linkup}
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      # Expose the API directly. With the `tls` profile + a domain you can instead
      # remove this and let Caddy (443) be the only public port.
      - '4000:4000'
    volumes:
      - uploads:/app/uploads

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # Public origin the browser uses (same domain, fronted by the router).
        NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:-https://linkup.mahansigdel.com.np/api/v1}
        NEXT_PUBLIC_WS_URL: ${PUBLIC_ORIGIN:-https://linkup.mahansigdel.com.np}
        # Google sign-in (public client ID; baked into the browser bundle).
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    restart: unless-stopped
    environment:
      NODE_ENV: production
    depends_on:
      - api
    expose:
      - '3000'

  # Single-domain router (HTTP only; TLS terminated by Cloudflare Tunnel/edge).
  # Routes /api + /socket.io -> api, everything else -> web. This is what the
  # Cloudflare Tunnel points at: http://router:80
  router:
    image: caddy:2-alpine
    restart: unless-stopped
    volumes:
      - ./deploy/router.Caddyfile:/etc/caddy/Caddyfile:ro
      - router_data:/data
      - router_config:/config
    depends_on:
      - api
      - web
    ports:
      # Local-only on the VM, for verification (curl http://localhost:8088/...).
      - '127.0.0.1:8088:80'

  # Cloudflare Tunnel — outbound connection, so NO inbound firewall/ports needed
  # and Cloudflare terminates HTTPS. Set TUNNEL_TOKEN in .env.production and add a
  # Public Hostname in the Cloudflare dashboard:
  #   linkup.mahansigdel.com.np  ->  http://router:80
  # Start with: ... --profile tunnel up -d
  cloudflared:
    image: cloudflare/cloudflared:latest
    profiles: ['tunnel']
    restart: unless-stopped
    # TUNNEL_TOKEN is set in .env.production before starting the `tunnel` profile.
    # Defaulted to empty so non-tunnel commands (build/up of other services) parse.
    command: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN:-}
    depends_on:
      - router

  # Database admin panel (pgweb) — browse/query Postgres from the browser.
  # Protected by HTTP basic auth (PGWEB_AUTH_USER/PGWEB_AUTH_PASS in .env.production)
  # and locked to this DB. Start with `--profile tools up -d pgweb` and expose via a
  # Cloudflare Tunnel public hostname: db.mahansigdel.com.np -> http://pgweb:8081
  pgweb:
    image: sosedoff/pgweb:latest
    profiles: ['tools']
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-linkup}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-linkup}?sslmode=disable
      PGWEB_AUTH_USER: ${PGWEB_AUTH_USER:-admin}
      PGWEB_AUTH_PASS: ${PGWEB_AUTH_PASS:-}
      PGWEB_LOCK_SESSION: 'true'
    depends_on:
      postgres:
        condition: service_healthy

  # Optional: HTTPS reverse proxy with automatic Let's Encrypt certs.
  # Enable with `--profile tls` and set DOMAIN in .env.production + DNS A record.
  caddy:
    image: caddy:2-alpine
    profiles: ['tls']
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN:?set DOMAIN to use the tls profile}
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  uploads:
  caddy_data:
  caddy_config:
  router_data:
  router_config:
